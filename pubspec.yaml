name: scraps
description: "A Flutter app for scrap collection and management."

publish_to: 'none'

version: 2.0.0+6

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter
  
  # UI and Icons
  cupertino_icons: ^1.0.8
  unicons: ^3.0.0
  
  # Backend and Database
  supabase_flutter: ^2.3.4
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.5
  
  # HTTP and API
  http: ^1.2.2
  dio: ^5.7.0
  
  # Media and Files
  image_picker: ^1.1.2
  path_provider: ^2.0.9
  open_file: ^3.5.11
  
  # Permissions
  permission_handler: ^11.0.1
  
  # Location
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  
  # Storage
  shared_preferences: ^2.2.2
  
  # UUID Generation
  uuid: ^4.2.1
  
  # Utilities
  intl: ^0.20.1
  url_launcher: ^6.1.5
  video_player: ^2.9.1
  
  # SMS Autofill
  sms_autofill: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    background_color: "#FFFFFF"
    theme_color: "#2E7D32"
  image_path: assets/app_icon_new.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/app_icon_new.png
  min_sdk_android: 21

flutter:
  uses-material-design: true
  
  assets:
    - assets/
    - assets/ecg_logo.png
    - assets/scraps.png
    - assets/scraps_icon.png
    - assets/app_icon_new.png
    - assets/scraps_logo.png
    - assets/scraps_splash.png
    - assets/g1.jpg
    - assets/g2.jpg
    - assets/g3.jpg
    - assets/g4.jpg
    - assets/g5.jpg
    - assets/g6.jpg
    - assets/g7.jpg
    - assets/g8.jpg
    - assets/g9.jpg
    - assets/g10.jpg
    - assets/g11.jpg
    - assets/g12.jpg
    - assets/g13.jpg
