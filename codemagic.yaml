# Codemagic: https://codemagic.io — connect this repo, add App Store Connect API key, then run this workflow.
# In Codemagic: Integrations → App Store Connect → add API key (Issuer ID, Key ID, .p8).
# Replace codemagic_app_store_connect below with your integration name from Team settings.

workflows:
  ios-release:
    name: Greenhaul iOS (App Store / TestFlight)
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic_app_store_connect
    environment:
      groups:
        - ios_signing # must contain IOS_CERT_KEY (secure)
      flutter: stable
      xcode: latest
      vars:
        BUNDLE_ID: "com.greenhaul.scraps"
    scripts:
      - name: Set up code signing
        script: |
          set -e
          keychain initialize
          # Reuse a persistent RSA private key stored as a secure Codemagic
          # env var (IOS_CERT_KEY). On the first build the CLI uses this
          # key to create the iOS Distribution cert + App Store profile in
          # App Store Connect; on every subsequent build it matches the
          # public-key fingerprint and just downloads the existing cert,
          # so we never hit Apple's "one active Distribution cert" 409.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@env:IOS_CERT_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Flutter dependencies
        script: |
          set -e
          flutter pub get
      - name: Install CocoaPods
        script: |
          set -e
          cd ios && pod install
      - name: Build IPA
        script: |
          set -e
          flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Optional: auto-add to an internal testers group once it's created in App Store Connect → TestFlight.
        # beta_groups:
        #   - Internal Testers
